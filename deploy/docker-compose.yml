services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: charon-postgres
    environment:
      POSTGRES_DB: charon
      POSTGRES_USER: charon
      POSTGRES_PASSWORD: charon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charon -d charon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: charon-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: charon-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: api
    container_name: charon-api
    environment:
      CHARON_APP_ENV: development
      CHARON_API_HTTP_ADDR: :8080
      CHARON_PUBLIC_BASE_URL: http://localhost:8080
      CHARON_POSTGRES_URL: postgres://charon:charon@postgres:5432/charon?sslmode=disable
      CHARON_REDIS_URL: redis://redis:6379/0
      CHARON_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHARON_ADMIN_WEB_URL: http://localhost:3000
      CHARON_ACCESS_TOKEN_SECRET: development-access-secret-change-before-shipping
      CHARON_REFRESH_TOKEN_PEPPER: development-refresh-pepper-change-before-shipping
      CHARON_JWT_ISSUER: charon
      CHARON_ACCESS_TOKEN_TTL: 15m
      CHARON_REFRESH_TOKEN_TTL: 720h
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    container_name: charon-worker
    environment:
      CHARON_APP_ENV: development
      CHARON_API_HTTP_ADDR: :8080
      CHARON_PUBLIC_BASE_URL: http://localhost:8080
      CHARON_POSTGRES_URL: postgres://charon:charon@postgres:5432/charon?sslmode=disable
      CHARON_REDIS_URL: redis://redis:6379/0
      CHARON_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHARON_ADMIN_WEB_URL: http://localhost:3000
      CHARON_ACCESS_TOKEN_SECRET: development-access-secret-change-before-shipping
      CHARON_REFRESH_TOKEN_PEPPER: development-refresh-pepper-change-before-shipping
      CHARON_JWT_ISSUER: charon
      CHARON_ACCESS_TOKEN_TTL: 15m
      CHARON_REFRESH_TOKEN_TTL: 720h
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: migrate
    environment:
      CHARON_APP_ENV: development
      CHARON_API_HTTP_ADDR: :8080
      CHARON_PUBLIC_BASE_URL: http://localhost:8080
      CHARON_POSTGRES_URL: postgres://charon:charon@postgres:5432/charon?sslmode=disable
      CHARON_REDIS_URL: redis://redis:6379/0
      CHARON_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHARON_ADMIN_WEB_URL: http://localhost:3000
      CHARON_ACCESS_TOKEN_SECRET: development-access-secret-change-before-shipping
      CHARON_REFRESH_TOKEN_PEPPER: development-refresh-pepper-change-before-shipping
      CHARON_JWT_ISSUER: charon
      CHARON_ACCESS_TOKEN_TTL: 15m
      CHARON_REFRESH_TOKEN_TTL: 720h
      CHARON_MIGRATIONS_DIR: /app/migrations
      CHARON_SEEDS_DIR: /app/seeds
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE: seed
    environment:
      CHARON_APP_ENV: development
      CHARON_API_HTTP_ADDR: :8080
      CHARON_PUBLIC_BASE_URL: http://localhost:8080
      CHARON_POSTGRES_URL: postgres://charon:charon@postgres:5432/charon?sslmode=disable
      CHARON_REDIS_URL: redis://redis:6379/0
      CHARON_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHARON_ADMIN_WEB_URL: http://localhost:3000
      CHARON_ACCESS_TOKEN_SECRET: development-access-secret-change-before-shipping
      CHARON_REFRESH_TOKEN_PEPPER: development-refresh-pepper-change-before-shipping
      CHARON_JWT_ISSUER: charon
      CHARON_ACCESS_TOKEN_TTL: 15m
      CHARON_REFRESH_TOKEN_TTL: 720h
      CHARON_MIGRATIONS_DIR: /app/migrations
      CHARON_SEEDS_DIR: /app/seeds
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
